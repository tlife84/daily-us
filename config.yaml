site:
  feed_url: "https://us-insight.com/feed?type=all"
  profile_dir: ".us-insight-profile"
  auth_state_path: "data/auth_state.json"
  session_storage_path: "data/session_storage.json"
  headless: true
  navigation_timeout_ms: 45000

storage:
  database_path: "data/seen.sqlite3"
  download_dir: "downloads"

telegram:
  bot_token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TELEGRAM_CHAT_ID"
  chat_ids_env: "TELEGRAM_CHAT_IDS"
  admin_chat_id_env: "TELEGRAM_ADMIN_CHAT_ID"

watchers:
  - name: "good_morning_damsaem"
    title_contains: "굿모닝 담쌤"
    send_audio: true
    audio_filename_template: "굿모닝 담쌤 {mm-dd}"
    only_today: true
    active_hours: ["07:00", "09:10"]
    interval_minutes: 10
    max_posts_per_poll: 5

  - name: "always_date"
    title_contains: "언제나 데이트"
    title_exclude_contains: ["영상"]
    send_audio: false
    active_hours: ["07:00", "22:00"]
    interval_minutes: 60
    max_posts_per_poll: 5

  - name: "company_analysis_guide"
    title_contains: "기업분석도감"
    send_audio: false
    send_pdf: true
    active_days: ["sun"]
    active_hours: ["12:00", "20:00"]
    interval_minutes: 60
    max_posts_per_poll: 5
